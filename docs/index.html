<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClawWatch</title>
  <meta name="description" content="ClawWatch - smartwatch-native AI agent by ThinkOff">
  <style>
    :root {
      --bg: #0a0d12;
      --card: #101723;
      --text: #f3f7ff;
      --muted: #9eb2cc;
      --accent: #2cd9ff;
      --accent2: #4df7b1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, #0f2746 0%, transparent 55%),
        radial-gradient(1200px 700px at 90% 110%, #173023 0%, transparent 50%),
        var(--bg);
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(5px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 6vw, 56px);
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 22px;
      line-height: 1.55;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 20px);
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a.button {
      text-decoration: none;
      color: #031014;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      font-size: 15px;
    }
    a.secondary {
      color: var(--text);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ClawWatch</h1>
    <p>The first smartwatch-native AI agent. Tap, talk, and get a response on your wrist.</p>
    <div class="links">
      <a class="button" href="https://github.com/ThinkOffApp/ClawWatch">GitHub Repository</a>
      <a class="button secondary" href="https://github.com/ThinkOffApp/ClawWatch/releases/tag/v1.0.0">v1.0.0 Release</a>
      <a class="button secondary" href="https://x.com/i/status/2028946464119165140">Launch Video</a>
    </div>
  </main>
</body>
</html>
