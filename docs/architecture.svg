<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .title{font:700 28px Arial; fill:#0f172a}
      .h1{font:700 20px Arial; fill:#111827}
      .txt{font:500 15px Arial; fill:#1f2937}
      .small{font:500 13px Arial; fill:#374151}
      .box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:14}
      .group{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;rx:18}
      .cloud{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .side{fill:#ecfeff;stroke:#0891b2;stroke-width:2;rx:18}
      .arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#m)}
      .arrow2{stroke:#4f46e5;stroke-width:2.5;fill:none;marker-end:url(#m2)}
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/>
    </marker>
  </defs>

  <text x="40" y="48" class="title">ClawWatch Architecture</text>

  <rect x="35" y="80" width="780" height="730" class="group"/>
  <text x="60" y="115" class="h1">Galaxy Watch (Wear OS)</text>

  <rect x="70" y="150" width="310" height="70" class="box"/>
  <text x="90" y="192" class="txt">Avatar UI + Adaptive Mic Button</text>

  <rect x="70" y="260" width="220" height="70" class="box"/>
  <text x="95" y="302" class="txt">Vosk STT (on-device)</text>

  <rect x="340" y="260" width="250" height="70" class="box"/>
  <text x="365" y="302" class="txt">ClawRunner (routing/context)</text>

  <rect x="640" y="260" width="140" height="70" class="box"/>
  <text x="665" y="302" class="txt">Android TTS</text>

  <rect x="640" y="370" width="140" height="70" class="box"/>
  <text x="668" y="412" class="txt">Speaker</text>

  <rect x="340" y="390" width="250" height="80" class="box"/>
  <text x="372" y="422" class="txt">Kotlin RAG / Search</text>
  <text x="398" y="444" class="small">(optional by rag_mode)</text>

  <rect x="70" y="520" width="310" height="90" class="box"/>
  <text x="95" y="555" class="txt">SecurePrefs + ConfigSyncService</text>
  <text x="95" y="578" class="small">encrypted settings + phone sync</text>

  <rect x="70" y="650" width="710" height="125" class="box"/>
  <text x="95" y="690" class="txt">Behavior states: idle, listening, thinking, searching, speaking, error</text>
  <text x="95" y="715" class="small">Auto-listen window after answer; tap to interrupt while speaking</text>
  <text x="95" y="740" class="small">Low-battery mode: greyer avatar + reduced animation work</text>

  <rect x="875" y="110" width="490" height="280" class="cloud"/>
  <text x="900" y="145" class="h1">Cloud</text>

  <rect x="910" y="180" width="420" height="85" class="box"/>
  <text x="935" y="215" class="txt">LLM API (Claude / GPT / Gemini)</text>
  <text x="935" y="238" class="small">request/response for assistant answers</text>

  <rect x="910" y="290" width="420" height="75" class="box"/>
  <text x="935" y="332" class="txt">Search APIs (Tavily / Brave, optional)</text>

  <rect x="875" y="430" width="490" height="330" class="side"/>
  <text x="900" y="465" class="h1">Phone + Local Admin</text>

  <rect x="910" y="500" width="420" height="85" class="box"/>
  <text x="935" y="535" class="txt">Phone Companion App</text>
  <text x="935" y="558" class="small">pairing, target selection, status</text>

  <rect x="910" y="620" width="420" height="110" class="box"/>
  <text x="935" y="655" class="txt">Admin Panel (localhost:4747)</text>
  <text x="935" y="678" class="small">push config/settings, deploy, logs</text>
  <text x="935" y="701" class="small">ADB over Wi-Fi to watch</text>

  <path class="arrow" d="M380 185 L380 295"/>
  <path class="arrow" d="M292 295 L338 295"/>
  <path class="arrow" d="M592 295 L638 295"/>
  <path class="arrow" d="M710 332 L710 368"/>

  <path class="arrow2" d="M590 295 L908 220"/>
  <path class="arrow2" d="M910 245 L592 315"/>

  <path class="arrow2" d="M465 390 L908 325"/>
  <path class="arrow2" d="M910 345 L592 418"/>

  <path class="arrow" d="M380 565 L465 565 L465 470"/>
  <path class="arrow" d="M910 540 L382 570"/>
  <path class="arrow" d="M910 675 L382 590"/>

  <text x="862" y="211" class="small">HTTPS</text>
  <text x="862" y="324" class="small">optional search</text>
</svg>
